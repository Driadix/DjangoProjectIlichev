{% extends "app/layout.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <h2>Регистрация пользователя</h2>
        <form method="post" class="form-horizontal">
            {% csrf_token %}
            <div class="form-group">
                {{ regform.as_p }}
            </div>
            <div class="form-group">
                <input type="submit" value="Зарегистрировать" class="btn btn-primary" />
            </div>
        </form>
    </div>
</div>
{% endblock %}
